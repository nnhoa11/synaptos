services:
  postgres:
    image: postgres:16-alpine
    container_name: synaptos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: synaptos_v2
      POSTGRES_USER: synaptos
      POSTGRES_PASSWORD: synaptos
    ports:
      - "5432:5432"
    volumes:
      - synaptos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synaptos -d synaptos_v2"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  synaptos_postgres_data:
